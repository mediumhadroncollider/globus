<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Hegemon — oddychający kontynent</title>
<!-- d3-delaunay: ta sama biblioteka Woronoja, której używaliśmy w prototypach.
     Klient dostaje z serwera TYLKO punkty i sam odtwarza identyczną geometrię
     (diagram Woronoja jest jednoznacznie wyznaczony przez punkty).
     LEKCJA Z BŁĘDU: pierwsza wersja ładowała ten skrypt z CDN-u — z adresu,
     który nie istniał (404). Skrypt się nie wczytał, "d3" nie powstało i cały
     klient wywracał się po cichu. Teraz biblioteka leży W PROJEKCIE
     (static/d3-delaunay.min.js): lokalna gra nie zależy od internetu, a wersja
     nigdy nie zniknie ani się nie zmieni pod nami. -->
<script src="/static/d3-delaunay.min.js"></script>
<style>
  /* Wygląd interfejsu — zwykły CSS, nic magicznego */
  * { box-sizing: border-box; }
  body { margin: 0; background: #10151b; color: #e8e2d2;
         font-family: Georgia, serif; overflow: hidden; }
  #pasek { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
           padding: 10px 16px; border-bottom: 1px solid #2a2f36; }
  #tytul { font-size: 17px; letter-spacing: .22em; text-transform: uppercase; }
  #tytul span { color: #8a8272; font-size: 12px; letter-spacing: .08em; }
  button, select { padding: 6px 12px; font-size: 12px; letter-spacing: .06em;
    cursor: pointer; background: transparent; color: #d8d2c2;
    border: 1px solid #4a4438; border-radius: 3px; font-family: inherit;
    text-transform: uppercase; }
  button.aktywny { background: #c9a227; color: #171512; border-color: #c9a227; }
  select { text-transform: none; background: #171d24; }
  #scena { position: relative; width: 100vw; height: calc(100vh - 53px); }
  canvas { position: absolute; inset: 0; touch-action: none; }
  .panel { position: absolute; background: rgba(16,20,26,.9);
           border: 1px solid #3a3f47; border-radius: 4px; padding: 10px 14px;
           font-size: 12px; pointer-events: none; line-height: 1.5; }
  #info    { left: 14px; bottom: 14px; min-width: 240px; }
  #ranking { right: 14px; top: 14px; min-width: 230px; }
  #suwak-box { display: flex; align-items: center; gap: 8px; font-size: 12px;
               color: #b8b0a0; }
  input[type=range] { width: 130px; accent-color: #c9a227; }
  .zloto { color: #c9a227; }
  .szary { color: #8a8272; }
</style>
</head>
<body>

<div id="pasek">
  <div id="tytul">Hegemon <span>· żywy kontynent po WebSockecie</span></div>
  <div style="flex:1"></div>
  <button id="w-wladcy"  class="aktywny">Władcy</button>
  <button id="w-pop">Populacja</button>
  <button id="w-doch">Dochód</button>
  <span class="szary">|</span>
  <span class="szary">Grasz jako:</span>
  <select id="wybor-krol"></select>
  <div id="suwak-box">
    podatek <input type="range" id="suwak" min="0" max="50" value="10">
    <b id="suwak-val" class="zloto">10%</b>
  </div>
</div>

<div id="scena">
  <canvas id="mapa"></canvas>
  <div class="panel" id="info">Łączę się ze światem…</div>
  <div class="panel" id="ranking"></div>
</div>

<script>
"use strict";
(async () => {
// Pomocnik diagnostyczny: pokazuje etapy startu i KAŻDY błąd wprost w panelu.
// Dzięki temu awaria nigdy nie wygląda jak wieczne "łączę się…".
const _info = document.getElementById("info");
const etap = (t) => { _info.textContent = t; };
window.addEventListener("error", e => {
  _info.innerHTML = "<b style='color:#e07050'>Błąd:</b> " + e.message;
});
try {

/* ===========================================================================
   1. POBRANIE ŚWIATA
   Dwa zapytania: małe dane JSON-em, wielkie tablice jako czyste bajty.
   =========================================================================== */
if (typeof d3 === "undefined") {
  throw new Error("nie wczytał się /static/d3-delaunay.min.js (sprawdź, czy plik jest w katalogu static/)");
}
etap("Pobieram opis świata…");
const meta = await (await fetch("/api/meta")).json();
etap("Pobieram tablice świata…");
const buf  = await (await fetch("/api/dane")).arrayBuffer();

const N = meta.n_komorek;
const TRYB_SCENARIUSZA = !!meta.tryb_scenariusza;
const KOLOR_NICZYJE = "#5c6656";   // "jednolity szarozielony" (patrz brief 0001)

// Nakładamy "widoki" na wspólny bufor bajtów — kolejność i typy MUSZĄ
// odpowiadać temu, co skleja server.py (nasz mini-protokół binarny):
//   punkty f32×N×2, kom_pow i32×N, kom_ziemia i32×N, zyznosc f32×N, lad u8×N
const punkty    = new Float32Array(buf, 0,      N * 2);
const komPow    = new Int32Array  (buf, N * 8,  N);
const komZiemia = new Int32Array  (buf, N * 12, N);
const zyznosc   = new Float32Array(buf, N * 16, N);
const lad       = new Uint8Array  (buf, N * 20, N);

/* ---------------------------------------------------------------------------
   JEDNOSTKA POLITYCZNA I WŁAŚCICIEL — te same nazwy niezależnie od trybu.
   Tryb scenariusza: jednostka = ZIEMIA, właściciel = PAŃSTWO.
   Tryb proceduralny (bez scenariusz_800.json): jednostka = powiat,
   właściciel = królestwo — dokładnie jak dawniej, nic się nie psuje.
   komJednostka[komórka] == -1 istnieje TYLKO w trybie scenariusza
   ("ziemia niczyja" — jedna szara masa, patrz CLAUDE.md).
   --------------------------------------------------------------------------- */
const komJednostka = TRYB_SCENARIUSZA ? komZiemia : komPow;
const nJednostek = TRYB_SCENARIUSZA ? meta.ziemie.length : meta.n_pow;
const nWlascicieli = TRYB_SCENARIUSZA ? meta.panstwa.length : meta.n_krol;

// Zmienny stan przychodzący z serwera (aktualizowany na bieżąco). Nazwa
// "wlasciciel" zastępuje dawne "powKrol" — ten sam kształt (per jednostka),
// zmieniany JEDNĄ liczbą przy podboju. meta.ziemie[*].panstwo to już BIEŻĄCY
// indeks właściciela (server.py go liczy z żywej tablicy ziemia_panstwo,
// nie ze statycznego scenariusza) — gracz łączący się w trakcie gry widzi
// prawdziwy stan, nie ten sprzed ewentualnych podbojów.
let wlasciciel = TRYB_SCENARIUSZA
  ? Int32Array.from(meta.ziemie.map(z => z.panstwo))
  : Int32Array.from(meta.pow_krol);
let podatki   = Float64Array.from(meta.podatki);
let jednPop   = new Float64Array(nJednostek);   // wypełnią się po 1. ticku
let jednDoch  = new Float64Array(nJednostek);
let skarbiec  = new Float64Array(nWlascicieli);
let wlDoch    = new Float64Array(nWlascicieli);
let niczyjePop = 0;
let nrTicka   = 0;

function nazwaJednostkiGry(j)    { return TRYB_SCENARIUSZA ? meta.ziemie[j].nazwa_gry    : meta.nazwy_pow[j]; }
function nazwaJednostkiRobocza(j){ return TRYB_SCENARIUSZA ? meta.ziemie[j].nazwa_robocza : null; }
function nazwaWlascicielaGry(w)  { return TRYB_SCENARIUSZA ? meta.panstwa[w].nazwa_gry    : meta.nazwy_krol[w]; }

/* ===========================================================================
   2. GEOMETRIA: odtworzenie diagramu Woronoja z samych punktów
   =========================================================================== */
const W = meta.W, H = meta.H, RS = 2;   // RS = mnożnik rozdzielczości renderu
etap("Odtwarzam diagram Woronoja z punktów…");
const delaunay = new d3.Delaunay(punkty);
const voronoi  = delaunay.voronoi([0, 0, W, H]);

// Ścieżka każdej JEDNOSTKI = suma wielokątów jej komórek, plus jedna zbiorcza
// dla ziemi niczyjej. Budujemy raz; potem malowanie to jedno wywołanie
// fill(path) — ten sam "batching", który przy 150k komórkach uratował render.
const sciezkaJednostki = Array.from({ length: nJednostek }, () => new Path2D());
const sciezkaNiczyje = new Path2D();
for (let c = 0; c < N; c++) {
  if (!lad[c]) continue;
  const j = komJednostka[c];
  if (j >= 0) voronoi.renderCell(c, sciezkaJednostki[j]);
  else voronoi.renderCell(c, sciezkaNiczyje);
}

// Granice: krawędź Woronoja "wie", które dwie komórki rozdziela, więc od razu
// wiemy, czy to wybrzeże, granica jednostki, czy właściciela. Granice
// jednostek i wybrzeże są geometrycznie stałe; to, czy krawędź jest CIENKA
// (wewnątrz tego samego właściciela) czy GRUBA (różni właściciele, w tym
// właściciel kontra ziemia niczyja) zależy od własności — stąd funkcja
// przebudowy, wołana po każdym podboju.
const grBrzeg = new Path2D();
let grJednostka = new Path2D(), grWlasciciel = new Path2D();
// zerwane sąsiedztwa (cieśniny z korekt ręcznych) — zbiór do szybkiego testu
const zerwane = new Set((meta.zerwane || []).map(([a, b]) =>
  a < b ? a * N + b : b * N + a));
const { halfedges, triangles } = delaunay;
const cc = voronoi.circumcenters;
const krawedzieWewn = [];   // [x1,y1,x2,y2, jednostkaA, jednostkaB] — do przebudów
for (let e = 0; e < halfedges.length; e++) {
  const opp = halfedges[e];
  if (opp < e) continue;                       // każda krawędź tylko raz
  const a = triangles[e];
  const b = triangles[e % 3 === 2 ? e - 2 : e + 1];
  const ta = (e / 3) | 0, tb = (opp / 3) | 0;
  const x1 = cc[2*ta], y1 = cc[2*ta+1], x2 = cc[2*tb], y2 = cc[2*tb+1];
  // klucz pary komórek: a*N+b mieści się bez strat w liczbie JS (N^2 < 2^53)
  const paraKlucz = (a < b ? a * N + b : b * N + a);
  if (lad[a] !== lad[b] || zerwane.has(paraKlucz)) {
    // prawdziwe wybrzeże ALBO cieśnina zerwana ręcznie w generatorze —
    // wizualnie jedno i drugie to woda, więc rysujemy tą samą kreską
    grBrzeg.moveTo(x1,y1); grBrzeg.lineTo(x2,y2);
  }
  else if (lad[a] && komJednostka[a] !== komJednostka[b]) {
    krawedzieWewn.push([x1,y1,x2,y2,komJednostka[a],komJednostka[b]]);
  }
}
function wlascicielJednostki(j) { return j >= 0 ? wlasciciel[j] : -1; }
function przebudujGranice() {
  grJednostka = new Path2D(); grWlasciciel = new Path2D();
  for (const [x1,y1,x2,y2,ja,jb] of krawedzieWewn) {
    const cel = (wlascicielJednostki(ja) !== wlascicielJednostki(jb)) ? grWlasciciel : grJednostka;
    cel.moveTo(x1,y1); cel.lineTo(x2,y2);
  }
}
przebudujGranice();

/* ===========================================================================
   3. KOLORY I WARSTWY RENDEROWANIA
   =========================================================================== */
// paleta właścicieli: barwy z PANSTWA (scenariusz) albo równe kroki po kole
// barw, jak dawniej (tryb proceduralny, działa dla dowolnego n_krol).
const kolorWlasciciela = TRYB_SCENARIUSZA
  ? meta.panstwa.map(p => p.kolor)
  : Array.from({ length: nWlascicieli }, (_, k) => `hsl(${(k * 360 / nWlascicieli) | 0} 34% 58%)`);

// mapa ciepła dla populacji/dochodu: granat -> złoto (prosty lerp dwóch barw)
function cieplo(t) {
  t = Math.max(0, Math.min(1, t));
  const r = 30 + t * (231 - 30), g = 45 + t * (185 - 45), b = 80 + t * (69 - 80);
  return `rgb(${r|0},${g|0},${b|0})`;
}

// Warstwa "władcy" zmienia się rzadko (tylko podboje) — trzymamy ją wypaloną
// na niewidocznym canvasie i tylko kopiujemy. Mapy ciepła malujemy na żywo,
// bo to ledwie kilka tysięcy ścieżek jednostek.
const wladcyCv = document.createElement("canvas");
wladcyCv.width = W * RS; wladcyCv.height = H * RS;
function wypalWladcow() {
  const g = wladcyCv.getContext("2d");
  g.setTransform(RS, 0, 0, RS, 0, 0);
  g.fillStyle = "#26313c"; g.fillRect(0, 0, W, H);
  g.lineWidth = 1;
  // ziemia niczyja: jedna szara masa pod spodem
  g.fillStyle = g.strokeStyle = KOLOR_NICZYJE;
  g.fill(sciezkaNiczyje); g.stroke(sciezkaNiczyje);
  for (let j = 0; j < nJednostek; j++) {
    g.fillStyle = g.strokeStyle = kolorWlasciciela[wlasciciel[j]];
    g.fill(sciezkaJednostki[j]); g.stroke(sciezkaJednostki[j]);  // stroke zszywa szwy
  }
}
wypalWladcow();

/* ===========================================================================
   4. RYSOWANIE NA EKRAN (kamera: pan + zoom)
   =========================================================================== */
const cv = document.getElementById("mapa");
const scena = document.getElementById("scena");
let kam = { s: 1, tx: 0, ty: 0, min: 0.1, max: 10 };
let widok = "wladcy", hoverCel = -1;

// Próg przeciągania: pointerdown NIE zaczyna panoramowania od razu — dopiero
// gdy kursor odjedzie o PROG_PX od miejsca wciśnięcia. Bez tego drżenie ręki
// przy zwykłym (albo podwójnym) kliku o 1-2 px potrafiło "pociągnąć" mapę.
let nacisk = null;         // {x,y} — gdzie wciśnięto (do liczenia progu)
let poprzednia = null;     // {x,y} — ostatnia pozycja (baza panoramowania)
let przeciagam = false;    // czy próg już przekroczony
const PROG_PX = 4;

// Batching rysowania: seria zdarzeń (wheel, pointermove) potrafi wywołać
// rysuj() dziesiątki razy między klatkami, a rysuj() obrysowuje ~180 tys.
// odcinków granic przy oddaleniu na całą Europę — przeglądarka się dławi.
// Zamiast rysować od razu, planujemy najwyżej jedno przerysowanie na klatkę.
let czekaNaKlatke = false;
function zaplanujRysowanie() {
  if (czekaNaKlatke) return;
  czekaNaKlatke = true;
  requestAnimationFrame(() => { czekaNaKlatke = false; rysuj(); });
}

// Limity zoomu liczone ZAWSZE od skali "cała mapa mieści się w oknie" — nie
// od startowego kadru scenariusza (kadr Kentu i Sussexu to zaledwie kilkadziesiąt
// px płótna; gdyby to on wyznaczał minimum, nie dałoby się oddalić do Europy).
let skalaCalosc = 1;
function ustawLimity() {
  skalaCalosc = Math.min(scena.clientWidth / W, scena.clientHeight / H);
  kam.min = skalaCalosc * 0.9;    // cała Europa mieści się z zapasem
  kam.max = skalaCalosc * 120;    // zejście do pojedynczych komórek w Kencie
}

// Widok startowy: bbox obu państw scenariusza (kadr_startowy, policzony w
// scenariusz_800.py), a bez scenariusza — cała mapa, jak dawniej. Osobna
// funkcja od ustawLimity(), żeby resize NIE odrzucał gracza z powrotem do
// kadru startowego (tylko przelicza limity zoomu, kamera zostaje, gdzie była).
function ustawWidokStartowy() {
  if (TRYB_SCENARIUSZA && meta.kadr_startowy) {
    const { x0, y0, x1, y1 } = meta.kadr_startowy;
    const bw = x1 - x0, bh = y1 - y0;
    const s = Math.min(scena.clientWidth / bw, scena.clientHeight / bh);
    kam.s = s;
    kam.tx = (scena.clientWidth - bw * s) / 2 - x0 * s;
    kam.ty = (scena.clientHeight - bh * s) / 2 - y0 * s;
  } else {
    kam.s = skalaCalosc;
    kam.tx = (scena.clientWidth - W * skalaCalosc) / 2;
    kam.ty = (scena.clientHeight - H * skalaCalosc) / 2;
  }
}
function resetWidok() { ustawWidokStartowy(); zaplanujRysowanie(); }

function rysuj() {
  const dpr = window.devicePixelRatio || 1;
  if (cv.width !== scena.clientWidth * dpr) {
    cv.width = scena.clientWidth * dpr; cv.height = scena.clientHeight * dpr;
  }
  const g = cv.getContext("2d");
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
  g.fillStyle = "#10151b"; g.fillRect(0, 0, scena.clientWidth, scena.clientHeight);
  g.setTransform(kam.s*dpr, 0, 0, kam.s*dpr, kam.tx*dpr, kam.ty*dpr);

  if (widok === "wladcy") {
    g.drawImage(wladcyCv, 0, 0, W, H);
  } else {
    g.fillStyle = "#26313c";
    g.fillRect(0, 0, W, H);
    g.fillStyle = g.strokeStyle = KOLOR_NICZYJE;
    g.fill(sciezkaNiczyje); g.stroke(sciezkaNiczyje);
    const dane = widok === "pop" ? jednPop : jednDoch;
    // normalizacja "per widok": 95. percentyl jako maks, żeby jedna bogata
    // jednostka nie spłaszczała całej skali barw
    const kopia = Array.from(dane).sort((a, b) => a - b);
    const max = kopia[(kopia.length * 0.95) | 0] || 1;
    for (let j = 0; j < nJednostek; j++) {
      g.fillStyle = g.strokeStyle = cieplo(dane[j] / max);
      g.fill(sciezkaJednostki[j]); g.stroke(sciezkaJednostki[j]);
    }
  }

  // granice — od najcieńszej. STAŁA SZEROKOŚĆ NA EKRANIE: rysujemy pod
  // transformacją kamery (współrzędne świata), więc kreska o szerokości W
  // miałaby na ekranie W×zoom pikseli i grubiałaby przy przybliżaniu.
  // Antidotum: dzielimy przez skalę — szerokość w świecie maleje dokładnie
  // tak, jak zoom rośnie, więc na ekranie kreska ma zawsze tyle samo pikseli
  // (tak robią wszystkie mapy internetowe).
  g.lineJoin = g.lineCap = "round";
  // przy mocnym oddaleniu granica jednostek (najgęstszy Path2D, ~180 tys.
  // odcinków) jest i tak niewidoczna — pomijamy ją, żeby zoom nie dławił
  if (kam.s >= kam.min * 3) {
    g.strokeStyle = "rgba(20,16,10,.4)"; g.lineWidth = 0.7 / kam.s; g.stroke(grJednostka);
  }
  g.strokeStyle = "#1d1912"; g.lineWidth = 2.6 / kam.s; g.stroke(grWlasciciel);
  g.strokeStyle = "#171d24"; g.lineWidth = 1.9 / kam.s; g.stroke(grBrzeg);

  // podświetlenie jednostki (albo ziemi niczyjej) pod kursorem
  if (hoverCel >= 0 && lad[hoverCel]) {
    const j = komJednostka[hoverCel];
    g.fillStyle = "rgba(255,250,235,.22)";
    g.fill(j >= 0 ? sciezkaJednostki[j] : sciezkaNiczyje);
  }
}
ustawLimity(); ustawWidokStartowy(); rysuj();
window.addEventListener("resize", () => {
  ustawLimity();
  kam.s = Math.min(kam.max, Math.max(kam.min, kam.s));   // reszta (tx/ty) zostaje — resize nie wyrzuca z widoku
  zaplanujRysowanie();
});
window.addEventListener("keydown", ev => {
  if (ev.key === "Home") { ev.preventDefault(); resetWidok(); }
});
// "podwójny klik prawym" nie istnieje jako natywne zdarzenie — prawy klik
// zawsze budzi "contextmenu", więc dwa takie zdarzenia blisko w czasie to
// jego odpowiednik. Menu kontekstowe i tak tłumimy (mapa nie ma swojego).
let ostatniPrawy = 0;
cv.addEventListener("contextmenu", ev => {
  ev.preventDefault();
  const teraz = performance.now();
  if (teraz - ostatniPrawy < 400) resetWidok();
  ostatniPrawy = teraz;
});

/* ===========================================================================
   5. INTERAKCJA: hover, pan, zoom, podbój
   =========================================================================== */
function naSwiat(ev) {
  const r = cv.getBoundingClientRect();
  return [(ev.clientX - r.left - kam.tx) / kam.s,
          (ev.clientY - r.top  - kam.ty) / kam.s];
}
cv.addEventListener("pointermove", ev => {
  if (nacisk && !przeciagam) {
    const dx = ev.clientX - nacisk.x, dy = ev.clientY - nacisk.y;
    if (dx*dx + dy*dy > PROG_PX*PROG_PX) przeciagam = true;
  }
  if (przeciagam) {
    kam.tx += ev.clientX - poprzednia.x; kam.ty += ev.clientY - poprzednia.y;
    poprzednia = { x: ev.clientX, y: ev.clientY };
    zaplanujRysowanie();
    return;
  }
  const [x, y] = naSwiat(ev);
  let nowy = -1;
  if (x >= 0 && y >= 0 && x <= W && y <= H) {
    const c = delaunay.find(x, y);      // najbliższa komórka: superszybkie
    if (lad[c]) nowy = c;
  }
  if (nowy !== hoverCel) { hoverCel = nowy; odswiezInfo(); zaplanujRysowanie(); }
});
cv.addEventListener("pointerdown", ev => {
  nacisk = { x: ev.clientX, y: ev.clientY };
  poprzednia = { x: ev.clientX, y: ev.clientY };
  przeciagam = false;
  cv.setPointerCapture(ev.pointerId);
});
cv.addEventListener("pointerup", ev => {
  // Kliknięcie = wciśnięcie i puszczenie BEZ przekroczenia progu przeciągania.
  // Shift+klik = podbój jednostki dla wybranego właściciela.
  // Zauważ: klient NICZEGO nie zmienia sam — wysyła rozkaz, a prawda
  // wraca z serwera (wiadomość "zmiana"). Jedno źródło prawdy = zero rozjazdów.
  if (!przeciagam && ev.shiftKey && hoverCel >= 0) {
    const j = komJednostka[hoverCel];
    if (TRYB_SCENARIUSZA) {
      ws.send(JSON.stringify({ typ: "podboj", ziemia: j, panstwo: mojWlasciciel() }));
    } else {
      ws.send(JSON.stringify({ typ: "podboj", powiat: j, krolestwo: mojWlasciciel() }));
    }
  }
  nacisk = null; poprzednia = null; przeciagam = false;
});
cv.addEventListener("pointerleave", () => {
  nacisk = null; poprzednia = null; przeciagam = false;
  hoverCel = -1; odswiezInfo(); zaplanujRysowanie();
});
cv.addEventListener("wheel", ev => {
  ev.preventDefault();
  const r = cv.getBoundingClientRect();
  const mx = ev.clientX - r.left, my = ev.clientY - r.top;
  // Krok proporcjonalny do przewinięcia (nie sztywne 15%) — gładzik sypie
  // seriami drobnych zdarzeń, mysz z kółkiem wysokiej rozdzielczości podobnie;
  // bez tego zoom skacze zamiast płynąć. deltaMode normalizuje jednostki
  // (0 = piksele, 1 = linie, 2 = strony — różne urządzenia/przeglądarki).
  const jednostka = ev.deltaMode === 1 ? 16 : ev.deltaMode === 2 ? 100 : 1;
  const f = Math.exp(-ev.deltaY * jednostka * 0.0015);
  const ns = Math.min(kam.max, Math.max(kam.min, kam.s * f));
  const k = ns / kam.s;
  // punkt kotwiczenia = kursor — zostaje pod myszą niezależnie od zoomu
  kam.tx = mx - (mx - kam.tx) * k; kam.ty = my - (my - kam.ty) * k; kam.s = ns;
  zaplanujRysowanie();
}, { passive: false });

/* ===========================================================================
   6. WEBSOCKET: nasłuch ticków i zmian
   =========================================================================== */
const ws = new WebSocket(`ws://${location.host}/ws`);
ws.onmessage = ev => {
  const m = JSON.parse(ev.data);
  if (m.co === "tick") {
    nrTicka = m.tick;
    jednPop = TRYB_SCENARIUSZA ? m.ziemia_pop : m.pow_pop;
    jednDoch = TRYB_SCENARIUSZA ? m.ziemia_doch : m.pow_doch;
    if (TRYB_SCENARIUSZA) niczyjePop = m.niczyje_pop;
    skarbiec = m.skarbiec; podatki = m.podatki;
    if (!TRYB_SCENARIUSZA) wlDoch = m.krol_doch;
    odswiezRanking(); odswiezInfo();
    if (widok !== "wladcy") rysuj();      // mapy ciepła żyją co tick
  } else if (m.co === "zmiana" && m.typ === "podboj") {
    const j = TRYB_SCENARIUSZA ? m.ziemia : m.powiat;
    const w = TRYB_SCENARIUSZA ? m.panstwo : m.krolestwo;
    wlasciciel[j] = w;                    // serwer potwierdził — aktualizujemy
    wypalWladcow(); przebudujGranice(); rysuj();
  } else if (m.co === "zmiana" && m.typ === "podatek") {
    podatki[m.panstwo] = m.stawka;
    if (m.panstwo === mojWlasciciel()) synchronizujSuwak();
  } else if (m.co === "zmiana" && m.typ === "odmowa") {
    // Odrzucony rozkaz (np. podbój ziemi niczyjej) NIE ginie po cichu —
    // gracz musi wiedzieć, że kliknął źle, a nie że coś się zepsuło.
    pokazKomunikat(m.powod || "Rozkaz odrzucony.");
  }
};

/* ===========================================================================
   7. PANELE I STEROWANIE
   =========================================================================== */
const info = document.getElementById("info");
const ranking = document.getElementById("ranking");
const wybor = document.getElementById("wybor-krol");
const suwak = document.getElementById("suwak");
const suwakVal = document.getElementById("suwak-val");

// Wybór "grasz jako": w scenariuszu tylko Cantia i Australes Saxones (bo
// meta.panstwa zawiera dokładnie te dwa państwa), w trybie proceduralnym —
// jak dawniej, wszystkie losowe królestwa.
for (let w = 0; w < nWlascicieli; w++) {
  const o = document.createElement("option");
  o.value = w; o.textContent = nazwaWlascicielaGry(w);
  wybor.appendChild(o);
}
wybor.value = TRYB_SCENARIUSZA ? meta.panstwo_gracz : 0;
const mojWlasciciel = () => +wybor.value;

// W scenariuszu suwak podatku ZAWSZE dotyczy państwa gracza (Cantii) —
// niezależnie od tego, kogo pokazuje rozwijana lista (ta służy do wyboru
// celu podboju shift+klikiem). W trybie proceduralnym suwak podąża za listą,
// jak dawniej.
function celPodatku() { return TRYB_SCENARIUSZA ? meta.panstwo_gracz : mojWlasciciel(); }

function synchronizujSuwak() {
  suwak.value = Math.round(podatki[celPodatku()] * 100);
  suwakVal.textContent = suwak.value + "%";
}
wybor.onchange = () => { if (!TRYB_SCENARIUSZA) synchronizujSuwak(); rysuj(); };
suwak.oninput = () => {
  suwakVal.textContent = suwak.value + "%";
  const cel = celPodatku();
  ws.send(JSON.stringify({ typ: "podatek", panstwo: cel, krolestwo: cel, stawka: suwak.value / 100 }));
};
synchronizujSuwak();

// Komunikat tymczasowy (np. odmowa podboju) przykrywa panel info na chwilę,
// niezależnie od tego, co akurat pokazuje hover — potem wraca normalny widok.
let komunikat = null;   // {tekst, doCzasu}
function pokazKomunikat(tekst, ms = 3000) {
  komunikat = { tekst, doCzasu: performance.now() + ms };
  odswiezInfo();
  setTimeout(() => {
    if (komunikat && performance.now() >= komunikat.doCzasu) { komunikat = null; odswiezInfo(); }
  }, ms + 20);
}

function odswiezInfo() {
  if (komunikat && performance.now() < komunikat.doCzasu) {
    info.innerHTML = `<b style="color:#e07050">${komunikat.tekst}</b>`;
    return;
  }
  if (hoverCel < 0) {
    info.innerHTML = `<span class="szary">Najedź na obszar. Kółko/gest = zoom,
      przeciągnij = przesuń.<br><b>Shift+klik</b> = podbój ziemi OBCEGO
      państwa dla wybranego państwa.<br><b>Home</b> albo podwójny prawy klik
      = powrót do widoku startowego.</span>`;
    return;
  }
  const j = komJednostka[hoverCel];
  if (j < 0) {
    // ziemia niczyja — brak podziału wewnętrznego, sama populacja tła
    info.innerHTML =
      `<span class="szary" style="letter-spacing:.14em;text-transform:uppercase">
         ziemie niczyje</span><br>
       populacja razem: <b>${Math.round(niczyjePop).toLocaleString("pl")}</b>`;
    return;
  }
  const w = wlasciciel[j];
  if (TRYB_SCENARIUSZA) {
    const z = meta.ziemie[j];
    const p = meta.panstwa[w];
    const wladca = p.wladca && p.wladca.imie
      ? `${p.wladca.imie}${p.wladca.tytul ? ", " + p.wladca.tytul : ""}` : "—";
    info.innerHTML =
      `<span class="zloto" style="letter-spacing:.14em;text-transform:uppercase">
         ${p.nazwa_gry}</span><br>
       <b style="font-size:15px">${z.nazwa_gry}</b>
       <span class="szary">(${z.nazwa_robocza})</span><br>
       władca: <b>${wladca}</b><br>
       populacja: <b>${Math.round(jednPop[j] || 0).toLocaleString("pl")}</b><br>
       dochód/tick: <b>${(+jednDoch[j] || 0).toFixed(1)}</b>`;
  } else {
    info.innerHTML =
      `<span class="zloto" style="letter-spacing:.14em;text-transform:uppercase">
         Królestwo ${meta.nazwy_krol[w]}</span><br>
       <b style="font-size:15px">${nazwaJednostkiGry(j)}</b><br>
       populacja: <b>${Math.round(jednPop[j] || 0).toLocaleString("pl")}</b><br>
       dochód/tick: <b>${(+jednDoch[j] || 0).toFixed(1)}</b>`;
  }
}
function odswiezRanking() {
  const wiersze = Array.from({ length: nWlascicieli }, (_, w) => ({ w, s: skarbiec[w] }))
    .sort((a, b) => b.s - a.s)
    .map(({ w, s }) =>
      `<span style="color:${kolorWlasciciela[w]}">■</span> ${nazwaWlascicielaGry(w)}
       <span class="szary">pod. ${(podatki[w]*100)|0}%</span>
       <b style="float:right">${Math.round(s).toLocaleString("pl")}</b>`)
    .join("<br>");
  ranking.innerHTML =
    `<span class="szary">tick ${nrTicka} · skarbce</span><br>` + wiersze;
}
odswiezInfo();

/* ===========================================================================
   8. PRZEŁĄCZANIE WIDOKÓW (Władcy / Populacja / Dochód)
   =========================================================================== */
const przyciskiWidoku = {
  wladcy: document.getElementById("w-wladcy"),
  pop: document.getElementById("w-pop"),
  doch: document.getElementById("w-doch"),
};
Object.entries(przyciskiWidoku).forEach(([nazwa, btn]) => {
  btn.onclick = () => {
    widok = nazwa;
    Object.values(przyciskiWidoku).forEach(b => b.classList.remove("aktywny"));
    btn.classList.add("aktywny");
    rysuj();
  };
});

} catch (err) {
  _info.innerHTML = "<b style='color:#e07050'>Błąd startu:</b> " + err.message;
  console.error(err);
}
})();
</script>
</body>
</html>
