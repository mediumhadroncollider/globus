<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Hegemon — oddychający kontynent</title>
<!-- d3-delaunay: ta sama biblioteka Woronoja, której używaliśmy w prototypach.
     Klient dostaje z serwera TYLKO punkty i sam odtwarza identyczną geometrię
     (diagram Woronoja jest jednoznacznie wyznaczony przez punkty).
     LEKCJA Z BŁĘDU: pierwsza wersja ładowała ten skrypt z CDN-u — z adresu,
     który nie istniał (404). Skrypt się nie wczytał, "d3" nie powstało i cały
     klient wywracał się po cichu. Teraz biblioteka leży W PROJEKCIE
     (static/d3-delaunay.min.js): lokalna gra nie zależy od internetu, a wersja
     nigdy nie zniknie ani się nie zmieni pod nami. -->
<script src="/static/d3-delaunay.min.js"></script>
<style>
  /* Wygląd interfejsu — zwykły CSS, nic magicznego */
  * { box-sizing: border-box; }
  body { margin: 0; background: #10151b; color: #e8e2d2;
         font-family: Georgia, serif; overflow: hidden;
         display: flex; flex-direction: column; height: 100vh; }
  #pasek { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
           padding: 10px 16px; border-bottom: 1px solid #2a2f36; }
  #pasek-edytor { display: none; align-items: center; gap: 10px; flex-wrap: wrap;
                  padding: 8px 16px; border-bottom: 1px solid #2a2f36; background: #171d24; }
  #tytul { font-size: 17px; letter-spacing: .22em; text-transform: uppercase; }
  #tytul span { color: #8a8272; font-size: 12px; letter-spacing: .08em; }
  button, select { padding: 6px 12px; font-size: 12px; letter-spacing: .06em;
    cursor: pointer; background: transparent; color: #d8d2c2;
    border: 1px solid #4a4438; border-radius: 3px; font-family: inherit;
    text-transform: uppercase; }
  button:disabled { opacity: .35; cursor: default; }
  button.aktywny { background: #c9a227; color: #171512; border-color: #c9a227; }
  select { text-transform: none; background: #171d24; }
  /* Scena zajmuje CAŁĄ resztę wysokości (flex:1), niezależnie od tego, czy nad
     nią jest jeden pasek (gra) czy dwa (edytor) — bez tego drugi pasek by
     ukradł miejsce spod mapy, zamiast się nad nią doliczyć. */
  #scena { position: relative; width: 100vw; flex: 1 1 auto; min-height: 0; }
  canvas { position: absolute; inset: 0; touch-action: none; }
  .panel { position: absolute; background: rgba(16,20,26,.9);
           border: 1px solid #3a3f47; border-radius: 4px; padding: 10px 14px;
           font-size: 12px; pointer-events: none; line-height: 1.5; }
  #info    { left: 14px; bottom: 14px; min-width: 240px; }
  #ranking { right: 14px; top: 14px; min-width: 230px; }
  #suwak-box { display: flex; align-items: center; gap: 8px; font-size: 12px;
               color: #b8b0a0; }
  input[type=range] { width: 130px; accent-color: #c9a227; }
  .zloto { color: #c9a227; }
  .szary { color: #8a8272; }
  hr.roz { border: none; border-top: 1px solid #3a3f47; margin: 6px 0; }
</style>
</head>
<body>

<div id="pasek">
  <div id="tytul">Hegemon <span>· żywy kontynent po WebSockecie</span></div>
  <div style="flex:1"></div>
  <button id="w-wladcy"  class="aktywny">Władcy</button>
  <button id="w-pop">Populacja</button>
  <button id="w-doch">Dochód</button>
  <span class="szary">|</span>
  <span class="szary">Grasz jako:</span>
  <select id="wybor-krol"></select>
  <div id="suwak-box">
    podatek <input type="range" id="suwak" min="0" max="50" value="10">
    <b id="suwak-val" class="zloto">10%</b>
  </div>
</div>

<!-- Pasek edytora świata (zadanie 0004) — istnieje w DOM zawsze, ale jest
     ukryty (display:none), dopóki JS nie wykryje ?edytor=1 w adresie. Dzięki
     temu zwykła rozgrywka wygląda i działa dokładnie tak jak dawniej. -->
<div id="pasek-edytor">
  <span class="szary">EDYTOR ŚWIATA:</span>
  <button id="e-lad" class="aktywny" title="Klik przełącza komórkę ląd/woda; przeciągnij, żeby malować">Ląd / woda</button>
  <button id="e-przynaleznosc" title="Klik przypisuje komórkę wybranemu państwu/ziemi; Alt+klik = do niczyich">Przynależność</button>
  <button id="e-ciesnina" title="Klik blisko granicy dwóch komórek zrywa/przywraca sąsiedztwo">Cieśnina</button>
  <button id="e-rzeka" title="Jak cieśnina, ale to na razie tylko znacznik i rysunek">Rzeka</button>
  <button id="e-gumka" title="Usuwa korektę wskazanej komórki albo krawędzi">Gumka</button>
  <span class="szary">|</span>
  <span class="szary">pędzel [ / ]:</span> <b id="e-pedzel" class="zloto">1</b>
  <span class="szary">|</span>
  <select id="e-panstwo" title="Państwo docelowe (narzędzie Przynależność)"></select>
  <select id="e-ziemia" title="Ziemia docelowa (narzędzie Przynależność)"></select>
  <span class="szary">|</span>
  <button id="e-wybrzeze" class="aktywny" title="Prawdziwa linia brzegowa Natural Earth (złota kreska przerywana)">Wybrzeże NE</button>
  <span class="szary">|</span>
  <span class="szary">niezapisane:</span> <b id="e-licznik" class="zloto">0</b>
  <button id="e-zapisz">Zapisz</button>
</div>

<div id="scena">
  <canvas id="mapa"></canvas>
  <div class="panel" id="info">Łączę się ze światem…</div>
  <div class="panel" id="ranking"></div>
  <div class="panel" id="klatka" style="right:14px; top:150px; display:none;"></div>
</div>

<script>
"use strict";
(async () => {
// Pomocnik diagnostyczny: pokazuje etapy startu i KAŻDY błąd wprost w panelu.
// Dzięki temu awaria nigdy nie wygląda jak wieczne "łączę się…".
const _info = document.getElementById("info");
const etap = (t) => { _info.textContent = t; };
window.addEventListener("error", e => {
  _info.innerHTML = "<b style='color:#e07050'>Błąd:</b> " + e.message;
});
try {

// Tryb edytora świata (zadanie 0004): włączany WYŁĄCZNIE parametrem URL
// ?edytor=1, żeby nie zaśmiecać zwykłej rozgrywki. Sprawdzamy to na samym
// początku — cała reszta skryptu odwołuje się do tej jednej stałej.
const EDYTOR = new URLSearchParams(location.search).get("edytor") === "1";

/* ===========================================================================
   1. POBRANIE ŚWIATA
   Dwa zapytania: małe dane JSON-em, wielkie tablice jako czyste bajty.
   W trybie edytora dochodzi trzecie: lista korekt (do podświetlenia tego,
   co już poprawiono, i do dokładnego działania "gumki" — patrz sekcja 4b).
   =========================================================================== */
if (typeof d3 === "undefined") {
  throw new Error("nie wczytał się /static/d3-delaunay.min.js (sprawdź, czy plik jest w katalogu static/)");
}
etap("Pobieram opis świata…");
const meta = await (await fetch("/api/meta")).json();
etap("Pobieram tablice świata…");
const buf  = await (await fetch("/api/dane")).arrayBuffer();
let korektyStart = null;
if (EDYTOR) {
  etap("Pobieram korekty edytora…");
  korektyStart = await (await fetch("/api/korekty")).json();
}

const N = meta.n_komorek;
const TRYB_SCENARIUSZA = !!meta.tryb_scenariusza;
const KOLOR_NICZYJE = "#5c6656";   // "jednolity szarozielony" (patrz brief 0001)

// Nakładamy "widoki" na wspólny bufor bajtów — kolejność i typy MUSZĄ
// odpowiadać temu, co skleja server.py (nasz mini-protokół binarny):
//   punkty f32×N×2, lonlat f32×N×2, kom_pow i32×N, kom_ziemia i32×N,
//   zyznosc f32×N, lad u8×N. Przesunięcia liczone z rozmiarów poprzednich
//   bloków (a nie na sztywno wpisanymi liczbami) — dopisanie nowego bloku
//   (np. lonlat dla edytora) nie wymaga przeliczania reszty w głowie.
const OFF_PUNKTY = 0;
const OFF_LONLAT = OFF_PUNKTY + N * 4 * 2;
const OFF_KOMPOW = OFF_LONLAT + N * 4 * 2;
const OFF_KOMZIEMIA = OFF_KOMPOW + N * 4;
const OFF_ZYZNOSC = OFF_KOMZIEMIA + N * 4;
const OFF_LAD = OFF_ZYZNOSC + N * 4;
const punkty    = new Float32Array(buf, OFF_PUNKTY,    N * 2);
const lonlat    = new Float32Array(buf, OFF_LONLAT,    N * 2);   // tożsamość geograficzna (edytor)
const komPow    = new Int32Array  (buf, OFF_KOMPOW,    N);
const komZiemia = new Int32Array  (buf, OFF_KOMZIEMIA, N);
const zyznosc   = new Float32Array(buf, OFF_ZYZNOSC,   N);
const lad       = new Uint8Array  (buf, OFF_LAD,       N);

/* ---------------------------------------------------------------------------
   JEDNOSTKA POLITYCZNA I WŁAŚCICIEL — te same nazwy niezależnie od trybu.
   Tryb scenariusza: jednostka = ZIEMIA, właściciel = PAŃSTWO.
   Tryb proceduralny (bez scenariusz_800.json): jednostka = powiat,
   właściciel = królestwo — dokładnie jak dawniej, nic się nie psuje.
   komJednostka[komórka] == -1 istnieje TYLKO w trybie scenariusza
   ("ziemia niczyja" — jedna szara masa, patrz CLAUDE.md).
   --------------------------------------------------------------------------- */
const komJednostka = TRYB_SCENARIUSZA ? komZiemia : komPow;
const nJednostek = TRYB_SCENARIUSZA ? meta.ziemie.length : meta.n_pow;
const nWlascicieli = TRYB_SCENARIUSZA ? meta.panstwa.length : meta.n_krol;

// Zmienny stan przychodzący z serwera (aktualizowany na bieżąco). Nazwa
// "wlasciciel" zastępuje dawne "powKrol" — ten sam kształt (per jednostka),
// zmieniany JEDNĄ liczbą przy podboju. meta.ziemie[*].panstwo to już BIEŻĄCY
// indeks właściciela (server.py go liczy z żywej tablicy ziemia_panstwo,
// nie ze statycznego scenariusza) — gracz łączący się później widzi
// prawdziwy stan, nie ten sprzed ewentualnych podbojów.
let wlasciciel = TRYB_SCENARIUSZA
  ? Int32Array.from(meta.ziemie.map(z => z.panstwo))
  : Int32Array.from(meta.pow_krol);
let podatki   = Float64Array.from(meta.podatki);
let jednPop   = new Float64Array(nJednostek);   // wypełnią się po 1. ticku
let jednDoch  = new Float64Array(nJednostek);
let skarbiec  = new Float64Array(nWlascicieli);
let wlDoch    = new Float64Array(nWlascicieli);
let niczyjePop = 0;
let nrTicka   = 0;

function nazwaJednostkiGry(j)    { return TRYB_SCENARIUSZA ? meta.ziemie[j].nazwa_gry    : meta.nazwy_pow[j]; }
function nazwaJednostkiRobocza(j){ return TRYB_SCENARIUSZA ? meta.ziemie[j].nazwa_robocza : null; }
function nazwaWlascicielaGry(w)  { return TRYB_SCENARIUSZA ? meta.panstwa[w].nazwa_gry    : meta.nazwy_krol[w]; }

/* ===========================================================================
   2. GEOMETRIA: odtworzenie diagramu Woronoja z samych punktów
   =========================================================================== */
const W = meta.W, H = meta.H, RS = 2;   // RS = mnożnik rozdzielczości renderu
etap("Odtwarzam diagram Woronoja z punktów…");
const delaunay = new d3.Delaunay(punkty);
const voronoi  = delaunay.voronoi([0, 0, W, H]);

function kluczPary(a, b) { return a < b ? a * N + b : b * N + a; }   // klucz nieuporządkowanej pary komórek

// Zerwane sąsiedztwa (cieśniny — proceduralne z generate_world.py ORAZ ręczne
// z edytora, server.py już je scaliło w /api/meta) — zbiór do szybkiego testu.
// Edytor może w TEJ SESJI dopisać/wyjąć z niego pary (narzędzie "Cieśnina"),
// dlatego to zwykły mutowalny Set, nie stała lista.
const zerwaneSet = new Set((meta.zerwane || []).map(([a, b]) => kluczPary(a, b)));
// Pary oznaczone jako "rzeka" (edytor) — czysto rysunkowe, NIE wchodzą do zerwaneSet.
const rzekiPary = new Set();

// Ścieżki i granice są PRZEBUDOWYWANE (nie tylko budowane raz), bo edytor
// świata może w trakcie sesji zmienić ląd/przynależność komórki — wtedy
// diagram trzeba przeliczyć, żeby podgląd na żywo się zgadzał (brief 0004:
// "klient przelicza lad/przypisania i przebudowuje ścieżki").
let sciezkaJednostki, sciezkaNiczyje, grBrzeg, sciezkaRzek, krawedzieWewn;
let krawEdgeMap;   // TYLKO w edytorze: para komórek -> odcinek [x1,y1,x2,y2], do testu trafienia myszą
function przebudujGeometrie() {
  sciezkaJednostki = Array.from({ length: nJednostek }, () => new Path2D());
  sciezkaNiczyje = new Path2D();
  for (let c = 0; c < N; c++) {
    if (!lad[c]) continue;
    const j = komJednostka[c];
    if (j >= 0) voronoi.renderCell(c, sciezkaJednostki[j]);
    else voronoi.renderCell(c, sciezkaNiczyje);
  }

  // Granice: krawędź Woronoja "wie", które dwie komórki rozdziela, więc od razu
  // wiemy, czy to wybrzeże, granica jednostki, czy właściciela.
  grBrzeg = new Path2D();
  sciezkaRzek = new Path2D();
  krawedzieWewn = [];
  if (EDYTOR) krawEdgeMap = new Map();
  const { halfedges, triangles } = delaunay;
  const cc = voronoi.circumcenters;
  for (let e = 0; e < halfedges.length; e++) {
    const opp = halfedges[e];
    if (opp < e) continue;                       // każda krawędź tylko raz
    const a = triangles[e];
    const b = triangles[e % 3 === 2 ? e - 2 : e + 1];
    const ta = (e / 3) | 0, tb = (opp / 3) | 0;
    const x1 = cc[2*ta], y1 = cc[2*ta+1], x2 = cc[2*tb], y2 = cc[2*tb+1];
    const paraKlucz = kluczPary(a, b);
    if (EDYTOR) krawEdgeMap.set(paraKlucz, [x1, y1, x2, y2]);
    if (rzekiPary.has(paraKlucz)) {
      sciezkaRzek.moveTo(x1, y1); sciezkaRzek.lineTo(x2, y2);
    }
    if (lad[a] !== lad[b] || zerwaneSet.has(paraKlucz)) {
      // prawdziwe wybrzeże ALBO cieśnina zerwana (proceduralnie albo ręcznie)
      grBrzeg.moveTo(x1,y1); grBrzeg.lineTo(x2,y2);
    }
    else if (lad[a] && komJednostka[a] !== komJednostka[b]) {
      krawedzieWewn.push([x1,y1,x2,y2,komJednostka[a],komJednostka[b]]);
    }
  }
}
przebudujGeometrie();

function wlascicielJednostki(j) { return j >= 0 ? wlasciciel[j] : -1; }
let grJednostka, grWlasciciel;
function przebudujGranice() {
  grJednostka = new Path2D(); grWlasciciel = new Path2D();
  for (const [x1,y1,x2,y2,ja,jb] of krawedzieWewn) {
    const cel = (wlascicielJednostki(ja) !== wlascicielJednostki(jb)) ? grWlasciciel : grJednostka;
    cel.moveTo(x1,y1); cel.lineTo(x2,y2);
  }
}
przebudujGranice();

/* ===========================================================================
   3. KOLORY I WARSTWY RENDEROWANIA
   =========================================================================== */
// paleta właścicieli: barwy z PANSTWA (scenariusz) albo równe kroki po kole
// barw, jak dawniej (tryb proceduralny, działa dla dowolnego n_krol).
const kolorWlasciciela = TRYB_SCENARIUSZA
  ? meta.panstwa.map(p => p.kolor)
  : Array.from({ length: nWlascicieli }, (_, k) => `hsl(${(k * 360 / nWlascicieli) | 0} 34% 58%)`);

// mapa ciepła dla populacji/dochodu: granat -> złoto (prosty lerp dwóch barw)
function cieplo(t) {
  t = Math.max(0, Math.min(1, t));
  const r = 30 + t * (231 - 30), g = 45 + t * (185 - 45), b = 80 + t * (69 - 80);
  return `rgb(${r|0},${g|0},${b|0})`;
}

// Warstwa "władcy" zmienia się rzadko (podboje, edycje) — trzymamy ją wypaloną
// na niewidocznym canvasie i tylko kopiujemy. Mapy ciepła malujemy na żywo,
// bo to ledwie kilka tysięcy ścieżek jednostek.
const wladcyCv = document.createElement("canvas");
wladcyCv.width = W * RS; wladcyCv.height = H * RS;
function wypalWladcow() {
  const g = wladcyCv.getContext("2d");
  g.setTransform(RS, 0, 0, RS, 0, 0);
  g.fillStyle = "#26313c"; g.fillRect(0, 0, W, H);
  g.lineWidth = 1;
  // ziemia niczyja: jedna szara masa pod spodem
  g.fillStyle = g.strokeStyle = KOLOR_NICZYJE;
  g.fill(sciezkaNiczyje); g.stroke(sciezkaNiczyje);
  for (let j = 0; j < nJednostek; j++) {
    g.fillStyle = g.strokeStyle = kolorWlasciciela[wlasciciel[j]];
    g.fill(sciezkaJednostki[j]); g.stroke(sciezkaJednostki[j]);  // stroke zszywa szwy
  }
}
wypalWladcow();

// Ziemia niczyja: wypalona na osobny canvas (patrz DZIENNIK.md, brief 0003) —
// mapy ciepła kopiują gotowy obrazek zamiast fill+stroke tych samych
// wielokątów co tick. W edytorze ta warstwa TEŻ bywa przebudowywana
// (komórka może zmienić ląd/właściciela), stąd nazwana funkcja, nie IIFE.
const niczyjeCv = document.createElement("canvas");
niczyjeCv.width = W * RS; niczyjeCv.height = H * RS;
function wypalNiczyje() {
  const g = niczyjeCv.getContext("2d");
  g.setTransform(RS, 0, 0, RS, 0, 0);
  g.clearRect(0, 0, W, H);
  g.fillStyle = g.strokeStyle = KOLOR_NICZYJE;
  g.lineWidth = 1;
  g.fill(sciezkaNiczyje); g.stroke(sciezkaNiczyje);
}
wypalNiczyje();

/* ===========================================================================
   3b. EDYTOR ŚWIATA (zadanie 0004)
   Zasada nadrzędna z briefu: EDYTOR NIE EDYTUJE ŚWIATA — edytuje listę
   korekt. Wszystko poniżej zmienia WYŁĄCZNIE żywe tablice klienta (do
   podglądu) i lokalne mapy korektyKomorek/korektyKrawedzi (do zapisu);
   world.npz i scenariusz_800.json nie są tu w ogóle dotykane.
   =========================================================================== */
const idZiemi = new Map(TRYB_SCENARIUSZA ? meta.ziemie.map((z, i) => [z.nazwa_robocza, i]) : []);
function idPanstwaZKlucza(klucz) { return meta.panstwa.findIndex(p => p.klucz === klucz); }

// Aktualny efektywny właściciel/ziemia komórki, WPROST z żywych tablic —
// dzięki temu, że korekty od razu mutują komZiemia, nie trzeba trzymać
// osobnej tablicy "właściciel per komórka": ziemia i tak jednoznacznie
// wyznacza państwo (wlasciciel[ziemia]).
function panstwoKluczKomorki(idx) {
  if (!TRYB_SCENARIUSZA) return null;
  const j = komZiemia[idx];
  return j >= 0 ? meta.panstwa[wlasciciel[j]].klucz : null;
}
function ziemiaNazwaKomorki(idx) {
  if (!TRYB_SCENARIUSZA) return null;
  const j = komZiemia[idx];
  return j >= 0 ? meta.ziemie[j].nazwa_robocza : null;
}

// korektyKomorek: idx -> {lad?, panstwo?, ziemia?, notatka?} — TO dokładnie
// trafia do zapisu (plus lonlat dopisywany dopiero przy budowaniu JSON-u).
const korektyKomorek = new Map();
// korektyKrawedzi: kluczPary(a,b) -> {a:[lon,lat], b:[lon,lat], typ, notatka?}
const korektyKrawedzi = new Map();
// bazowyStan: idx -> {lad, panstwo, ziemia} — stan SPRZED KOREKT (używa go
// "gumka" do dokładnego cofnięcia). Dla komórek już poprawionych w
// poprzednich sesjach seedujemy z serwera (patrz server.py, pole "_bazowe");
// dla komórek dziewiczych w tej sesji dopisuje się LENIWIE, przy pierwszym
// dotknięciu — w obu przypadkach to naprawdę stan "przed jakąkolwiek korektą".
const bazowyStan = new Map();

function polaWpisu(w) {
  const { lonlat: _l, a: _a, b: _b, ...pola } = w;
  return pola;
}

if (EDYTOR && korektyStart) {
  const wpisyKom = korektyStart.komorki || [];
  const bazoweKom = korektyStart._bazowe || [];
  wpisyKom.forEach((wpis, i) => {
    const b = bazoweKom[i];
    if (!b) return;
    korektyKomorek.set(b.idx, polaWpisu(wpis));
    bazowyStan.set(b.idx, { lad: b.lad, panstwo: b.panstwo, ziemia: b.ziemia });
  });
  const wpisyKraw = korektyStart.krawedzie || [];
  const idxKraw = korektyStart._krawedzie_idx || [];
  wpisyKraw.forEach((wpis, i) => {
    const para = idxKraw[i];
    if (!para) return;
    const [ia, ib] = para;
    const klucz = kluczPary(ia, ib);
    korektyKrawedzi.set(klucz, wpis);
    if (wpis.typ === "ciesnina") zerwaneSet.add(klucz);
    else if (wpis.typ === "rzeka") rzekiPary.add(klucz);
  });
  przebudujGeometrie();   // rzeki z poprzedniej sesji trzeba domalować
}

function pobierzBazowy(idx) {
  if (!bazowyStan.has(idx)) {
    bazowyStan.set(idx, {
      lad: !!lad[idx],
      panstwo: panstwoKluczKomorki(idx),
      ziemia: ziemiaNazwaKomorki(idx),
    });
  }
  return bazowyStan.get(idx);
}

// Nakłada wpis (albo null = "brak korekty") na ŻYWE tablice — brakujące pola
// wpisu dociąga z bazowyStan. Ta sama funkcja obsługuje i zwykłą edycję,
// i cofnięcie (undo), i "gumkę" — różni je tylko to, CO jej podajemy.
function zastosujDoZywegoStanu(idx, wpis) {
  const bazowy = pobierzBazowy(idx);
  const efLad    = wpis && ("lad" in wpis)     ? wpis.lad     : bazowy.lad;
  const efZiemia = wpis && ("ziemia" in wpis)  ? wpis.ziemia  : bazowy.ziemia;
  lad[idx] = efLad ? 1 : 0;
  if (TRYB_SCENARIUSZA) {
    komZiemia[idx] = (efZiemia != null && idZiemi.has(efZiemia)) ? idZiemi.get(efZiemia) : -1;
  }
}

function stanKorekty(idx) { return korektyKomorek.get(idx) || null; }
function ustawKorekte(idx, czesciowaZmiana) {
  const nowy = { ...(korektyKomorek.get(idx) || {}), ...czesciowaZmiana };
  korektyKomorek.set(idx, nowy);
  return nowy;
}

// --- pociągnięcie/klik jako JEDNA operacja cofalna (Ctrl+Z cofa całość) ----
let narzedzie = "lad";
let promienPedzla = 1;
let celPedzlaLad = true;
let edytorAktywny = false;
let aktualnaOperacja = null;
let dotknieteWTymPociagnieciu = new Set();
const stosCofania = [];
let zmianyNiezapisane = 0;

function odswiezLicznikZmian() {
  const el = document.getElementById("e-licznik");
  if (el) el.textContent = zmianyNiezapisane;
}
function odswiezPedzel() {
  const el = document.getElementById("e-pedzel");
  if (el) el.textContent = promienPedzla;
}

function rozpocznijOperacje() {
  aktualnaOperacja = { zmiany: [] };
  dotknieteWTymPociagnieciu = new Set();
}
function zakonczOperacje() {
  if (aktualnaOperacja && aktualnaOperacja.zmiany.length) {
    stosCofania.push(aktualnaOperacja);
    zmianyNiezapisane++;
    odswiezLicznikZmian();
  }
  aktualnaOperacja = null;
  zaplanujPrzebudowe();
}
function cofnijOperacje() {
  const op = stosCofania.pop();
  if (!op) return;
  for (let i = op.zmiany.length - 1; i >= 0; i--) {
    const z = op.zmiany[i];
    if (z.rodzaj === "krawedz") {
      if (z.przed) korektyKrawedzi.set(z.klucz, z.przed); else korektyKrawedzi.delete(z.klucz);
      zerwaneSet.delete(z.klucz); rzekiPary.delete(z.klucz);
      if (z.przed && z.przed.typ === "ciesnina") zerwaneSet.add(z.klucz);
      if (z.przed && z.przed.typ === "rzeka") rzekiPary.add(z.klucz);
    } else {
      if (z.przed) korektyKomorek.set(z.idx, z.przed); else korektyKomorek.delete(z.idx);
      zastosujDoZywegoStanu(z.idx, z.przed);
    }
  }
  zmianyNiezapisane = Math.max(0, zmianyNiezapisane - 1);
  odswiezLicznikZmian();
  zaplanujPrzebudowe();
}

function komorkiPedzla(c) {
  if (promienPedzla <= 1) return [c];
  return [c, ...delaunay.neighbors(c)];
}

function malujLad(idx, cel) {
  pobierzBazowy(idx);
  const przed = stanKorekty(idx);
  const po = ustawKorekte(idx, { lad: cel });
  zastosujDoZywegoStanu(idx, po);
  aktualnaOperacja.zmiany.push({ rodzaj: "komorka", idx, przed, po });
}

function ustawPrzynaleznosc(idx, alt) {
  if (!lad[idx]) return;   // przynależność ma sens tylko na lądzie
  pobierzBazowy(idx);
  const przed = stanKorekty(idx);
  let po;
  if (alt) {
    po = ustawKorekte(idx, { panstwo: null, ziemia: null });
  } else {
    const pWyb = document.getElementById("e-panstwo").value;
    const zWyb = document.getElementById("e-ziemia").value;
    if (!pWyb || !zWyb) { pokazKomunikat("Wybierz państwo i ziemię docelową."); return; }
    po = ustawKorekte(idx, { panstwo: pWyb, ziemia: zWyb });
  }
  zastosujDoZywegoStanu(idx, po);
  aktualnaOperacja.zmiany.push({ rodzaj: "komorka", idx, przed, po });
}

function usunKorekteKomorki(idx) {
  if (!korektyKomorek.has(idx)) return false;
  const przed = stanKorekty(idx);
  korektyKomorek.delete(idx);
  zastosujDoZywegoStanu(idx, null);
  aktualnaOperacja.zmiany.push({ rodzaj: "komorka", idx, przed, po: null });
  return true;
}

function przelaczKrawedz(ia, ib, typ) {
  const klucz = kluczPary(ia, ib);
  const przed = korektyKrawedzi.get(klucz) || null;
  zerwaneSet.delete(klucz); rzekiPary.delete(klucz);
  let po = null;
  if (!(przed && przed.typ === typ)) {
    po = { a: [lonlat[ia*2], lonlat[ia*2+1]], b: [lonlat[ib*2], lonlat[ib*2+1]], typ };
    korektyKrawedzi.set(klucz, po);
    if (typ === "ciesnina") zerwaneSet.add(klucz); else rzekiPary.add(klucz);
  } else {
    korektyKrawedzi.delete(klucz);
  }
  aktualnaOperacja.zmiany.push({ rodzaj: "krawedz", klucz, przed, po });
}

function usunKorekteKrawedzi(klucz) {
  const przed = korektyKrawedzi.get(klucz);
  if (!przed) return false;
  korektyKrawedzi.delete(klucz);
  zerwaneSet.delete(klucz); rzekiPary.delete(klucz);
  aktualnaOperacja.zmiany.push({ rodzaj: "krawedz", klucz, przed, po: null });
  return true;
}

// Odległość punktu od ODCINKA (nie od prostej) — do wskazywania krawędzi myszą.
function odlegloscOdOdcinka(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const dd = dx*dx + dy*dy;
  let t = dd > 0 ? ((px - x1)*dx + (py - y1)*dy) / dd : 0;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t*dx), py - (y1 + t*dy));
}
// Szukamy tylko wśród krawędzi SĄSIADUJĄCYCH z najbliższą komórką (garść
// odcinków, nie wszystkie ~180 tys.) — stąd błyskawiczne, mimo braku
// dedykowanej struktury przestrzennej dla samych krawędzi.
function najblizszaKrawedz(x, y) {
  const c = delaunay.find(x, y);
  let najlepsza = null, najlD = Infinity;
  for (const nb of delaunay.neighbors(c)) {
    const seg = krawEdgeMap.get(kluczPary(c, nb));
    if (!seg) continue;
    const d = odlegloscOdOdcinka(x, y, seg[0], seg[1], seg[2], seg[3]);
    if (d < najlD) { najlD = d; najlepsza = [c, nb]; }
  }
  const prog = 10 / kam.s;   // stała TOLERANCJA EKRANOWA — dzielimy przez zoom
  return najlD <= prog ? najlepsza : null;
}

function wykonajNarzedzie(ev, pierwszy) {
  const [x, y] = naSwiat(ev);
  if (x < 0 || y < 0 || x > W || y > H) return;
  if (narzedzie === "lad") {
    const c = delaunay.find(x, y);
    if (pierwszy) celPedzlaLad = !lad[c];
    for (const cc of komorkiPedzla(c)) {
      if (dotknieteWTymPociagnieciu.has(cc)) continue;
      dotknieteWTymPociagnieciu.add(cc);
      malujLad(cc, celPedzlaLad);
    }
  } else if (narzedzie === "przynaleznosc" && pierwszy) {
    ustawPrzynaleznosc(delaunay.find(x, y), ev.altKey);
  } else if ((narzedzie === "ciesnina" || narzedzie === "rzeka") && pierwszy) {
    const kraw = najblizszaKrawedz(x, y);
    if (kraw) przelaczKrawedz(kraw[0], kraw[1], narzedzie);
    else pokazKomunikat("Kliknij bliżej granicy między dwiema komórkami.");
  } else if (narzedzie === "gumka" && pierwszy) {
    const kraw = najblizszaKrawedz(x, y);
    const kluczKraw = kraw && kluczPary(kraw[0], kraw[1]);
    if (kraw && korektyKrawedzi.has(kluczKraw)) {
      usunKorekteKrawedzi(kluczKraw);
    } else if (!usunKorekteKomorki(delaunay.find(x, y))) {
      pokazKomunikat("Ta komórka/krawędź nie ma korekty do usunięcia.");
    }
  }
}

// Prawdziwa linia brzegowa Natural Earth — dane już mamy w meta.wybrzeze
// (piksele tego samego "płótna" co punkty, więc zero przeliczeń). Rysowana
// TYLKO w edytorze, jako pomoc przy porównywaniu z wygenerowanym lądem.
const sciezkaWybrzezeNE = new Path2D();
(meta.wybrzeze || []).forEach(ring => {
  ring.forEach(([x, y], i) => { if (i === 0) sciezkaWybrzezeNE.moveTo(x, y); else sciezkaWybrzezeNE.lineTo(x, y); });
});
let pokazWybrzezeNE = true;

// Zapis korekt do JSON-u (lonlat komórek dociągany PRZY BUDOWANIU, nie
// trzymany w mapie — zawsze świeży, z bieżącej siatki).
function zbudujKorektyDoZapisu() {
  const komorki = [];
  for (const [idx, pola] of korektyKomorek) {
    komorki.push({ lonlat: [Math.round(lonlat[idx*2]*1000)/1000, Math.round(lonlat[idx*2+1]*1000)/1000], ...pola });
  }
  const krawedzie = [...korektyKrawedzi.values()];
  return { wersja: 1, komorki, krawedzie };
}
async function zapiszKorekty() {
  const odp = await fetch("/api/korekty", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(zbudujKorektyDoZapisu()),
  });
  if (!odp.ok) throw new Error(`serwer odpowiedział ${odp.status}`);
  const wynik = await odp.json();
  zmianyNiezapisane = 0;
  odswiezLicznikZmian();
  pokazKomunikat(`Zapisano korekty: ${wynik.zapisano} wpisów.`, 2500);
}

if (EDYTOR) {
  document.getElementById("pasek-edytor").style.display = "flex";

  const narzedziaBtn = {
    lad: document.getElementById("e-lad"),
    przynaleznosc: document.getElementById("e-przynaleznosc"),

    rzeka: document.getElementById("e-rzeka"),
    gumka: document.getElementById("e-gumka"),
  };
  Object.entries(narzedziaBtn).forEach(([nazwa, btn]) => {
    btn.onclick = () => {
      if (btn.disabled) return;
      narzedzie = nazwa;
      Object.values(narzedziaBtn).forEach(b => b.classList.remove("aktywny"));
      btn.classList.add("aktywny");
    };
  });

  const wyborPanstwoEdytor = document.getElementById("e-panstwo");
  const wyborZiemiaEdytor = document.getElementById("e-ziemia");
  if (TRYB_SCENARIUSZA) {
    meta.panstwa.forEach(p => {
      const o = document.createElement("option");
      o.value = p.klucz; o.textContent = p.nazwa_gry;
      wyborPanstwoEdytor.appendChild(o);
    });
    function odswiezZiemieEdytor() {
      const pid = idPanstwaZKlucza(wyborPanstwoEdytor.value);
      wyborZiemiaEdytor.innerHTML = "";
      meta.ziemie.forEach((z, i) => {
        if (wlasciciel[i] !== pid) return;
        const o = document.createElement("option");
        o.value = z.nazwa_robocza; o.textContent = `${z.nazwa_gry} (${z.nazwa_robocza})`;
        wyborZiemiaEdytor.appendChild(o);
      });
    }
    wyborPanstwoEdytor.onchange = odswiezZiemieEdytor;
    odswiezZiemieEdytor();
  } else {
    // Format korekt "panstwo"/"ziemia" ma sens tylko w scenariuszu — bez
    // niego narzędzie nie miałoby czego przypisywać, więc je wyłączamy.
    narzedziaBtn.przynaleznosc.disabled = true;
    wyborPanstwoEdytor.disabled = true;
    wyborZiemiaEdytor.disabled = true;
  }

  const btnWybrzeze = document.getElementById("e-wybrzeze");
  btnWybrzeze.onclick = () => {
    pokazWybrzezeNE = !pokazWybrzezeNE;
    btnWybrzeze.classList.toggle("aktywny", pokazWybrzezeNE);
    zaplanujRysowanie();
  };

  document.getElementById("e-zapisz").onclick = async () => {
    try { await zapiszKorekty(); }
    catch (err) { pokazKomunikat("Błąd zapisu: " + err.message, 4000); }
  };

  // Niezapisane zmiany giną bezpowrotnie przy zamknięciu karty — ostrzegamy,
  // dokładnie jak prosi brief ("nagłówek pokazuje licznik... ostrzeżenie
  // przy zamknięciu karty z niezapisanymi zmianami").
  window.addEventListener("beforeunload", ev => {
    if (zmianyNiezapisane > 0) { ev.preventDefault(); ev.returnValue = ""; }
  });

  odswiezLicznikZmian();
  odswiezPedzel();
}

/* ===========================================================================
   4. RYSOWANIE NA EKRAN (kamera: pan + zoom)
   =========================================================================== */
const cv = document.getElementById("mapa");
const scena = document.getElementById("scena");
let kam = { s: 1, tx: 0, ty: 0, min: 0.1, max: 10 };
let widok = "wladcy", hoverCel = -1;

// Licznik czasu klatki (klawisz F) — żeby mierzyć koszt renderu zamiast
// zgadywać "na oko" (patrz DZIENNIK.md, wpadka z brief 0003). Domyślnie
// wyłączony: performance.now() wokół całej treści rysuj(), średnia z 30
// ostatnich klatek, wypisywana w rogu obok plakietki statystyk (ranking).
let licznikKlatek = false;
const klatkaEl = document.getElementById("klatka");
const czasyKlatek = [];

// Próg przeciągania: pointerdown NIE zaczyna panoramowania od razu — dopiero
// gdy kursor odjedzie o PROG_PX od miejsca wciśnięcia. Bez tego drżenie ręki
// przy zwykłym (albo podwójnym) kliku o 1-2 px potrafiło "pociągnąć" mapę.
let nacisk = null;         // {x,y} — gdzie wciśnięto (do liczenia progu)
let poprzednia = null;     // {x,y} — ostatnia pozycja (baza panoramowania)
let przeciagam = false;    // czy próg już przekroczony
const PROG_PX = 4;

// Batching rysowania: seria zdarzeń (wheel, pointermove) potrafi wywołać
// rysuj() dziesiątki razy między klatkami, a rysuj() obrysowuje ~180 tys.
// odcinków granic przy oddaleniu na całą Europę — przeglądarka się dławi.
// Zamiast rysować od razu, planujemy najwyżej jedno przerysowanie na klatkę.
let czekaNaKlatke = false;
function zaplanujRysowanie() {
  if (czekaNaKlatke) return;
  czekaNaKlatke = true;
  requestAnimationFrame(() => { czekaNaKlatke = false; rysuj(); });
}

// Batching PRZEBUDOWY geometrii (edytor): malowanie przeciąganiem potrafi
// dotknąć dziesiątki komórek między klatkami — przeliczamy diagram i wypalamy
// warstwy najwyżej raz na klatkę, dokładnie tym samym trikiem co zaplanujRysowanie.
let czekaNaPrzebudowe = false;
function zaplanujPrzebudowe() {
  if (czekaNaPrzebudowe) return;
  czekaNaPrzebudowe = true;
  requestAnimationFrame(() => {
    czekaNaPrzebudowe = false;
    przebudujGeometrie();
    przebudujGranice();
    wypalWladcow();
    wypalNiczyje();
    rysuj();
  });
}

// Limity zoomu liczone ZAWSZE od skali "cała mapa mieści się w oknie" — nie
// od startowego kadru scenariusza (kadr Kentu i Sussexu to zaledwie kilkadziesiąt
// px płótna; gdyby to on wyznaczał minimum, nie dałoby się oddalić do Europy).
let skalaCalosc = 1;
function ustawLimity() {
  skalaCalosc = Math.min(scena.clientWidth / W, scena.clientHeight / H);
  kam.min = skalaCalosc * 0.9;    // cała Europa mieści się z zapasem
  kam.max = skalaCalosc * 120;    // zejście do pojedynczych komórek w Kencie
}

// Widok startowy: bbox obu państw scenariusza (kadr_startowy, policzony w
// scenariusz_800.py), a bez scenariusza — cała mapa, jak dawniej. Osobna
// funkcja od ustawLimity(), żeby resize NIE odrzucał gracza z powrotem do
// kadru startowego (tylko przelicza limity zoomu, kamera zostaje, gdzie była).
function ustawWidokStartowy() {
  if (TRYB_SCENARIUSZA && meta.kadr_startowy) {
    const { x0, y0, x1, y1 } = meta.kadr_startowy;
    const bw = x1 - x0, bh = y1 - y0;
    const s = Math.min(scena.clientWidth / bw, scena.clientHeight / bh);
    kam.s = s;
    kam.tx = (scena.clientWidth - bw * s) / 2 - x0 * s;
    kam.ty = (scena.clientHeight - bh * s) / 2 - y0 * s;
  } else {
    kam.s = skalaCalosc;
    kam.tx = (scena.clientWidth - W * skalaCalosc) / 2;
    kam.ty = (scena.clientHeight - H * skalaCalosc) / 2;
  }
}
function resetWidok() { ustawWidokStartowy(); zaplanujRysowanie(); }

function rysuj() {
  const t0 = licznikKlatek ? performance.now() : 0;
  const dpr = window.devicePixelRatio || 1;
  if (cv.width !== scena.clientWidth * dpr) {
    cv.width = scena.clientWidth * dpr; cv.height = scena.clientHeight * dpr;
  }
  const g = cv.getContext("2d");
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
  g.fillStyle = "#10151b"; g.fillRect(0, 0, scena.clientWidth, scena.clientHeight);
  g.setTransform(kam.s*dpr, 0, 0, kam.s*dpr, kam.tx*dpr, kam.ty*dpr);

  if (widok === "wladcy") {
    g.drawImage(wladcyCv, 0, 0, W, H);
  } else {
    g.fillStyle = "#26313c";
    g.fillRect(0, 0, W, H);
    g.drawImage(niczyjeCv, 0, 0, W, H);
    const dane = widok === "pop" ? jednPop : jednDoch;
    // normalizacja "per widok": 95. percentyl jako maks, żeby jedna bogata
    // jednostka nie spłaszczała całej skali barw
    const kopia = Array.from(dane).sort((a, b) => a - b);
    const max = kopia[(kopia.length * 0.95) | 0] || 1;
    for (let j = 0; j < nJednostek; j++) {
      g.fillStyle = g.strokeStyle = cieplo(dane[j] / max);
      g.fill(sciezkaJednostki[j]); g.stroke(sciezkaJednostki[j]);
    }
  }

  // granice — od najcieńszej. STAŁA SZEROKOŚĆ NA EKRANIE: rysujemy pod
  // transformacją kamery (współrzędne świata), więc kreska o szerokości W
  // miałaby na ekranie W×zoom pikseli i grubiałaby przy przybliżaniu.
  // Antidotum: dzielimy przez skalę — szerokość w świecie maleje dokładnie
  // tak, jak zoom rośnie, więc na ekranie kreska ma zawsze tyle samo pikseli
  // (tak robią wszystkie mapy internetowe).
  g.lineJoin = g.lineCap = "round";
  // Przy mocnym oddaleniu granica jednostek (najgęstszy Path2D) jest i tak
  // niewidoczna — pomijamy ją, żeby zoom nie dławił. To realnie chroni tylko
  // TRYB PROCEDURALNY (grJednostka ~180 tys. odcinków, cała mapa podzielona
  // na powiaty). W TRYBIE SCENARIUSZA grJednostka jest malutka — ziemia
  // niczyja to jedna jednostka bez wewnętrznych krawędzi — więc próg *3 tylko
  // niepotrzebnie chował granice ziem przy oddaleniu; *1.5 daje margines na
  // wypadek dużych scenariuszy, nie kasując widoczności przy typowym zoomie.
  if (kam.s >= kam.min * 1.5) {
    g.strokeStyle = "rgba(20,16,10,.4)"; g.lineWidth = 0.7 / kam.s; g.stroke(grJednostka);
  }
  g.strokeStyle = "#1d1912"; g.lineWidth = 2.6 / kam.s; g.stroke(grWlasciciel);
  g.strokeStyle = "#171d24"; g.lineWidth = 1.9 / kam.s; g.stroke(grBrzeg);

  // podświetlenie jednostki pod kursorem — ziemi niczyjej NIGDY (23 600
  // wielokątów wypełnianych co klatkę zoomu; nie ma tam nic do wskazania,
  // panel info i tak mówi, że to ziemie niczyje — patrz brief 0003).
  if (hoverCel >= 0 && lad[hoverCel]) {
    const j = komJednostka[hoverCel];
    if (j >= 0) {
      g.fillStyle = "rgba(255,250,235,.22)";
      g.fill(sciezkaJednostki[j]);
    }
  }

  // --- pomoce ekranowe edytora (brief 0004) --------------------------------
  if (EDYTOR) {
    if (pokazWybrzezeNE) {
      g.save();
      g.setLineDash([4 / kam.s, 3 / kam.s]);
      g.strokeStyle = "#c9a227"; g.lineWidth = 1.3 / kam.s;
      g.stroke(sciezkaWybrzezeNE);
      g.restore();
    }
    // rzeki: znacznik/rysunek, bez wpływu na mechanikę (na razie)
    g.setLineDash([]);
    g.strokeStyle = "#3d7dc9"; g.lineWidth = 1.6 / kam.s;
    g.stroke(sciezkaRzek);
    // komórki z korektą: mały gruby znacznik w środku, żeby było widać co
    // jest ręczne, a co automatyczne (bez tego trudno odróżnić po samym kolorze)
    g.fillStyle = "#e8c85a";
    const promien = 3 / kam.s;
    for (const idx of korektyKomorek.keys()) {
      g.beginPath();
      g.arc(punkty[idx*2], punkty[idx*2+1], promien, 0, Math.PI * 2);
      g.fill();
    }
  }

  if (licznikKlatek) {
    czasyKlatek.push(performance.now() - t0);
    if (czasyKlatek.length > 30) czasyKlatek.shift();
    const srednia = czasyKlatek.reduce((a, b) => a + b, 0) / czasyKlatek.length;
    klatkaEl.textContent = `klatka: ${srednia.toFixed(2)} ms (śr. ${czasyKlatek.length})`;
  }
}
ustawLimity(); ustawWidokStartowy(); rysuj();
window.addEventListener("resize", () => {
  ustawLimity();
  kam.s = Math.min(kam.max, Math.max(kam.min, kam.s));   // reszta (tx/ty) zostaje — resize nie wyrzuca z widoku
  zaplanujRysowanie();
});
window.addEventListener("keydown", ev => {
  if (ev.key === "Home") { ev.preventDefault(); resetWidok(); }
  if (ev.key === "f" || ev.key === "F") {
    licznikKlatek = !licznikKlatek;
    klatkaEl.style.display = licznikKlatek ? "block" : "none";
    czasyKlatek.length = 0;
    if (!licznikKlatek) klatkaEl.textContent = "";
    zaplanujRysowanie();
  }
  if (EDYTOR) {
    if (ev.key === "[") { promienPedzla = 1; odswiezPedzel(); }
    if (ev.key === "]") { promienPedzla = 2; odswiezPedzel(); }
    if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === "z") {
      ev.preventDefault();
      cofnijOperacje();
    }
  }
});
// "podwójny klik prawym" nie istnieje jako natywne zdarzenie — prawy klik
// zawsze budzi "contextmenu", więc dwa takie zdarzenia blisko w czasie to
// jego odpowiednik. Menu kontekstowe i tak tłumimy (mapa nie ma swojego).
let ostatniPrawy = 0;
cv.addEventListener("contextmenu", ev => {
  ev.preventDefault();
  const teraz = performance.now();
  if (teraz - ostatniPrawy < 400) resetWidok();
  ostatniPrawy = teraz;
});

/* ===========================================================================
   5. INTERAKCJA: hover, pan, zoom, podbój — oraz (w edytorze) narzędzia
   Poza edytorem lewy przycisk panoramuje, tak jak zawsze. W edytorze lewy
   przycisk jest zarezerwowany dla aktywnego narzędzia (maluj/klik/gumka),
   a panoramowanie przenosi się na PRAWY przycisk — stąd warunek na ev.button
   niżej. Prawy przycisk już wcześniej działał jako pan (kod nie sprawdzał
   guzika), więc w edytorze po prostu z tego korzystamy zamiast zabierać
   lewy przycisk graczowi bez edytora.
   =========================================================================== */
function naSwiat(ev) {
  const r = cv.getBoundingClientRect();
  return [(ev.clientX - r.left - kam.tx) / kam.s,
          (ev.clientY - r.top  - kam.ty) / kam.s];
}
cv.addEventListener("pointermove", ev => {
  if (edytorAktywny) {
    wykonajNarzedzie(ev, false);
    return;
  }
  if (nacisk && !przeciagam) {
    const dx = ev.clientX - nacisk.x, dy = ev.clientY - nacisk.y;
    if (dx*dx + dy*dy > PROG_PX*PROG_PX) przeciagam = true;
  }
  if (przeciagam) {
    kam.tx += ev.clientX - poprzednia.x; kam.ty += ev.clientY - poprzednia.y;
    poprzednia = { x: ev.clientX, y: ev.clientY };
    zaplanujRysowanie();
    return;
  }
  const [x, y] = naSwiat(ev);
  let nowy = -1;
  if (x >= 0 && y >= 0 && x <= W && y <= H) {
    const c = delaunay.find(x, y);      // najbliższa komórka: superszybkie
    if (lad[c]) nowy = c;
  }
  if (nowy !== hoverCel) { hoverCel = nowy; odswiezInfo(); zaplanujRysowanie(); }
});
cv.addEventListener("pointerdown", ev => {
  if (EDYTOR && ev.button === 0) {
    ev.preventDefault();
    rozpocznijOperacje();
    wykonajNarzedzie(ev, true);
    edytorAktywny = true;
    cv.setPointerCapture(ev.pointerId);
    return;
  }
  nacisk = { x: ev.clientX, y: ev.clientY };
  poprzednia = { x: ev.clientX, y: ev.clientY };
  przeciagam = false;
  cv.setPointerCapture(ev.pointerId);
});
cv.addEventListener("pointerup", ev => {
  if (edytorAktywny) {
    zakonczOperacje();
    edytorAktywny = false;
    nacisk = null; poprzednia = null; przeciagam = false;
    return;
  }
  // Kliknięcie = wciśnięcie i puszczenie BEZ przekroczenia progu przeciągania.
  // Shift+klik = podbój jednostki dla wybranego właściciela.
  // Zauważ: klient NICZEGO nie zmienia sam — wysyła rozkaz, a prawda
  // wraca z serwera (wiadomość "zmiana"). Jedno źródło prawdy = zero rozjazdów.
  if (!przeciagam && ev.shiftKey && hoverCel >= 0) {
    const j = komJednostka[hoverCel];
    if (TRYB_SCENARIUSZA) {
      ws.send(JSON.stringify({ typ: "podboj", ziemia: j, panstwo: mojWlasciciel() }));
    } else {
      ws.send(JSON.stringify({ typ: "podboj", powiat: j, krolestwo: mojWlasciciel() }));
    }
  }
  nacisk = null; poprzednia = null; przeciagam = false;
});
cv.addEventListener("pointerleave", () => {
  if (edytorAktywny) { zakonczOperacje(); edytorAktywny = false; }
  nacisk = null; poprzednia = null; przeciagam = false;
  hoverCel = -1; odswiezInfo(); zaplanujRysowanie();
});
cv.addEventListener("wheel", ev => {
  ev.preventDefault();
  const r = cv.getBoundingClientRect();
  const mx = ev.clientX - r.left, my = ev.clientY - r.top;
  // Krok proporcjonalny do przewinięcia (nie sztywne 15%) — gładzik sypie
  // seriami drobnych zdarzeń, mysz z kółkiem wysokiej rozdzielczości podobnie;
  // bez tego zoom skacze zamiast płynąć. deltaMode normalizuje jednostki
  // (0 = piksele, 1 = linie, 2 = strony — różne urządzenia/przeglądarki).
  const jednostka = ev.deltaMode === 1 ? 16 : ev.deltaMode === 2 ? 100 : 1;
  const f = Math.exp(-ev.deltaY * jednostka * 0.0015);
  const ns = Math.min(kam.max, Math.max(kam.min, kam.s * f));
  const k = ns / kam.s;
  // punkt kotwiczenia = kursor — zostaje pod myszą niezależnie od zoomu
  kam.tx = mx - (mx - kam.tx) * k; kam.ty = my - (my - kam.ty) * k; kam.s = ns;
  zaplanujRysowanie();
}, { passive: false });

/* ===========================================================================
   6. WEBSOCKET: nasłuch ticków i zmian
   =========================================================================== */
const ws = new WebSocket(`ws://${location.host}/ws`);
ws.onmessage = ev => {
  const m = JSON.parse(ev.data);
  if (m.co === "tick") {
    nrTicka = m.tick;
    jednPop = TRYB_SCENARIUSZA ? m.ziemia_pop : m.pow_pop;
    jednDoch = TRYB_SCENARIUSZA ? m.ziemia_doch : m.pow_doch;
    if (TRYB_SCENARIUSZA) niczyjePop = m.niczyje_pop;
    skarbiec = m.skarbiec; podatki = m.podatki;
    if (!TRYB_SCENARIUSZA) wlDoch = m.krol_doch;
    odswiezRanking(); odswiezInfo();
    if (widok !== "wladcy") rysuj();      // mapy ciepła żyją co tick
  } else if (m.co === "zmiana" && m.typ === "podboj") {
    const j = TRYB_SCENARIUSZA ? m.ziemia : m.powiat;
    const w = TRYB_SCENARIUSZA ? m.panstwo : m.krolestwo;
    wlasciciel[j] = w;                    // serwer potwierdził — aktualizujemy
    wypalWladcow(); przebudujGranice(); rysuj();
  } else if (m.co === "zmiana" && m.typ === "podatek") {
    podatki[m.panstwo] = m.stawka;
    if (m.panstwo === mojWlasciciel()) synchronizujSuwak();
  } else if (m.co === "zmiana" && m.typ === "odmowa") {
    // Odrzucony rozkaz (np. podbój ziemi niczyjej) NIE ginie po cichu —
    // gracz musi wiedzieć, że kliknął źle, a nie że coś się zepsuło.
    pokazKomunikat(m.powod || "Rozkaz odrzucony.");
  }
};

/* ===========================================================================
   7. PANELE I STEROWANIE
   =========================================================================== */
const info = document.getElementById("info");
const ranking = document.getElementById("ranking");
const wybor = document.getElementById("wybor-krol");
const suwak = document.getElementById("suwak");
const suwakVal = document.getElementById("suwak-val");

// Wybór "grasz jako": w scenariuszu tylko Cantia i Australes Saxones (bo
// meta.panstwa zawiera dokładnie te dwa państwa), w trybie proceduralnym —
// jak dawniej, wszystkie losowe królestwa.
for (let w = 0; w < nWlascicieli; w++) {
  const o = document.createElement("option");
  o.value = w; o.textContent = nazwaWlascicielaGry(w);
  wybor.appendChild(o);
}
wybor.value = TRYB_SCENARIUSZA ? meta.panstwo_gracz : 0;
const mojWlasciciel = () => +wybor.value;

// W scenariuszu suwak podatku ZAWSZE dotyczy państwa gracza (Cantii) —
// niezależnie od tego, kogo pokazuje rozwijana lista (ta służy do wyboru
// celu podboju shift+klikiem). W trybie proceduralnym suwak podąża za listą,
// jak dawniej.
function celPodatku() { return TRYB_SCENARIUSZA ? meta.panstwo_gracz : mojWlasciciel(); }

function synchronizujSuwak() {
  suwak.value = Math.round(podatki[celPodatku()] * 100);
  suwakVal.textContent = suwak.value + "%";
}
wybor.onchange = () => { if (!TRYB_SCENARIUSZA) synchronizujSuwak(); rysuj(); };
suwak.oninput = () => {
  suwakVal.textContent = suwak.value + "%";
  const cel = celPodatku();
  ws.send(JSON.stringify({ typ: "podatek", panstwo: cel, krolestwo: cel, stawka: suwak.value / 100 }));
};
synchronizujSuwak();

// Komunikat tymczasowy (np. odmowa podboju, komunikaty edytora) przykrywa
// panel info na chwilę, niezależnie od tego, co akurat pokazuje hover —
// potem wraca normalny widok.
let komunikat = null;   // {tekst, doCzasu}
function pokazKomunikat(tekst, ms = 3000) {
  komunikat = { tekst, doCzasu: performance.now() + ms };
  odswiezInfo();
  setTimeout(() => {
    if (komunikat && performance.now() >= komunikat.doCzasu) { komunikat = null; odswiezInfo(); }
  }, ms + 20);
}

function odswiezInfo() {
  if (komunikat && performance.now() < komunikat.doCzasu) {
    info.innerHTML = `<b style="color:#e07050">${komunikat.tekst}</b>`;
    return;
  }
  let html;
  if (hoverCel < 0) {
    html = `<span class="szary">Najedź na obszar. Kółko/gest = zoom,
      przeciągnij = przesuń.<br><b>Shift+klik</b> = podbój ziemi OBCEGO
      państwa dla wybranego państwa.<br><b>Home</b> albo podwójny prawy klik
      = powrót do widoku startowego.</span>`;
  } else {
    const j = komJednostka[hoverCel];
    if (j < 0) {
      // ziemia niczyja — brak podziału wewnętrznego, sama populacja tła
      html =
        `<span class="szary" style="letter-spacing:.14em;text-transform:uppercase">
           ziemie niczyje</span><br>
         populacja razem: <b>${Math.round(niczyjePop).toLocaleString("pl")}</b>`;
    } else {
      const w = wlasciciel[j];
      if (TRYB_SCENARIUSZA) {
        const z = meta.ziemie[j];
        const p = meta.panstwa[w];
        const wladca = p.wladca && p.wladca.imie
          ? `${p.wladca.imie}${p.wladca.tytul ? ", " + p.wladca.tytul : ""}` : "—";
        html =
          `<span class="zloto" style="letter-spacing:.14em;text-transform:uppercase">
             ${p.nazwa_gry}</span><br>
           <b style="font-size:15px">${z.nazwa_gry}</b>
           <span class="szary">(${z.nazwa_robocza})</span><br>
           władca: <b>${wladca}</b><br>
           populacja: <b>${Math.round(jednPop[j] || 0).toLocaleString("pl")}</b><br>
           dochód/tick: <b>${(+jednDoch[j] || 0).toFixed(1)}</b>`;
      } else {
        html =
          `<span class="zloto" style="letter-spacing:.14em;text-transform:uppercase">
             Królestwo ${meta.nazwy_krol[w]}</span><br>
           <b style="font-size:15px">${nazwaJednostkiGry(j)}</b><br>
           populacja: <b>${Math.round(jednPop[j] || 0).toLocaleString("pl")}</b><br>
           dochód/tick: <b>${(+jednDoch[j] || 0).toFixed(1)}</b>`;
      }
    }
  }
  // Panel edytora: lon/lat komórki, jej obecny stan, czy ma korektę —
  // dopisany NA KOŃCU, żeby nie rozgałęziać powyższej logiki widoku.
  if (EDYTOR && hoverCel >= 0) {
    const lo = lonlat[hoverCel*2].toFixed(3), la = lonlat[hoverCel*2+1].toFixed(3);
    const maKorekte = korektyKomorek.has(hoverCel);
    const ziemiaTxt = TRYB_SCENARIUSZA
      ? (komZiemia[hoverCel] >= 0 ? meta.ziemie[komZiemia[hoverCel]].nazwa_robocza : "niczyje")
      : "—";
    html += `<hr class="roz">
      <span class="szary">EDYTOR</span> · lon ${lo} lat ${la}<br>
      ląd: <b>${lad[hoverCel] ? "tak" : "nie"}</b> · ziemia: <b>${ziemiaTxt}</b><br>
      korekta: <b style="color:${maKorekte ? "#c9a227" : "#8a8272"}">${maKorekte ? "TAK" : "nie"}</b>`;
  }
  info.innerHTML = html;
}
function odswiezRanking() {
  const wiersze = Array.from({ length: nWlascicieli }, (_, w) => ({ w, s: skarbiec[w] }))
    .sort((a, b) => b.s - a.s)
    .map(({ w, s }) =>
      `<span style="color:${kolorWlasciciela[w]}">■</span> ${nazwaWlascicielaGry(w)}
       <span class="szary">pod. ${(podatki[w]*100)|0}%</span>
       <b style="float:right">${Math.round(s).toLocaleString("pl")}</b>`)
    .join("<br>");
  ranking.innerHTML =
    `<span class="szary">tick ${nrTicka} · skarbce</span><br>` + wiersze;
}
odswiezInfo();

/* ===========================================================================
   8. PRZEŁĄCZANIE WIDOKÓW (Władcy / Populacja / Dochód)
   =========================================================================== */
const przyciskiWidoku = {
  wladcy: document.getElementById("w-wladcy"),
  pop: document.getElementById("w-pop"),
  doch: document.getElementById("w-doch"),
};
Object.entries(przyciskiWidoku).forEach(([nazwa, btn]) => {
  btn.onclick = () => {
    widok = nazwa;
    Object.values(przyciskiWidoku).forEach(b => b.classList.remove("aktywny"));
    btn.classList.add("aktywny");
    rysuj();
  };
});

} catch (err) {
  _info.innerHTML = "<b style='color:#e07050'>Błąd startu:</b> " + err.message;
  console.error(err);
}
})();
</script>
</body>
</html>
